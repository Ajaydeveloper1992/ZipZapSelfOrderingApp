name: zipzap_pos_self_orders
description: "A Complete POS System for your store Self Orders"
publish_to: "none"
version: 1.3.0

environment:
  sdk: ^3.9.2

dependencies:
  audioplayers: ^6.1.0
  calendar_date_picker2: ^2.0.1
  csv: ^6.0.0
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.2
  flutter_local_notifications: ^18.0.1
  flutter_svg: ^2.0.10+1
  http: ^1.2.0
  intl: ^0.19.0
  timezone: ^0.9.4
  package_info_plus: ^8.0.0
  path_provider: ^2.1.5
  shared_preferences: ^2.2.2
  toastification: ^2.3.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  web: ^1.1.1
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.3
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/zipzap-icon.svg
    - assets/sounds/

# Native splash screen configuration
flutter_native_splash:
  color: "#ffffff"
  color_dark: "#ffffff"
  android_12:
    color: "#ffffff"
  android: true
  ios: true
  web: false
  fullscreen: true
  android_gravity: fill
  ios_content_mode: scaleAspectFill
